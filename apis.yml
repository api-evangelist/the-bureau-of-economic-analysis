      - url: https://apps.bea.gov/API/docs/index.htm
        type: OpenAPI
      - url: >-
          https://raw.githubusercontent.com/api-evangelist/the-bureau-of-economic-analysis/refs/heads/main/openapi/the-bureau-of-economic-analysis-openapi.yml
        type: OpenAPI
    description: >-
      The Bureau of Economic Analysis (BEA) Data API provides programmatic
      access to BEA published economic statistics. Methods include retrieving
      statistical data and metadata from datasets covering National Income and
      Product Accounts (NIPA), GDP by Industry, Regional economic data by state
      and metro area, International Transactions Accounts (ITA), International
      Investment Position (IIP), Fixed Assets, Input-Output tables, Multinational
      Enterprises (MNE), and International Services Trade. Data is available in
      JSON or XML formats and requires a free API key.
    contact:
      - FN: BEA Developer Support
        url: https://www.bea.gov/resources/for-developers
        email: BEA.Data.API@bea.gov
    features:
      - Dataset Discovery
      - Parameter Discovery
      - NIPA Tables
      - GDP Data
      - Regional Economic Data
      - International Transactions
      - Fixed Assets
      - Input-Output Tables
      - Multinational Enterprise Data
      - JSON and XML Response Formats
    useCases:
      - Economic Research and Analysis
      - GDP Monitoring and Reporting
      - Regional Economic Development Planning
      - Trade Balance Analysis
      - Business Intelligence and Forecasting
      - Academic Research
      - Government Policy Analysis
    integrations:
