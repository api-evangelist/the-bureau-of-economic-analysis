description: >-
  The Bureau of Economic Analysis (BEA) is an agency within the U.S. Department
  of Commerce that provides economic data to policymakers, businesses, and the
  general public. The BEA collects and analyzes a wide range of economic
  indicators, including gross domestic product (GDP), personal income, and trade
  data. Through its reports and analysis, the BEA helps inform decision-making at
  all levels of government and helps businesses and individuals understand the
  state of the economy. The BEA Data API provides programmatic access to all
  published economic statistics including NIPA, regional data, international
  accounts, and industry-level data.
