        - name: DatasetName
          in: query
          type: string
          required: true
          description: Name of the dataset for which to retrieve parameters.
        - name: ResultFormat
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: parameter-values
