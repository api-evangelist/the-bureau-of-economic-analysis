          required: true
        - name: method
          in: query
          type: string
          required: true
        - name: DatasetName
          in: query
          type: string
          required: true
        - name: ParameterName
          in: query
          type: string
          required: true
          description: Name of the parameter for which to retrieve valid values.
        - name: ResultFormat
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
